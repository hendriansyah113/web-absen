<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Absensi Digital</title>

    <!-- LEAFLET -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #4facfe, #00f2fe);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
      }

      .container {
        background: #fff;
        padding: 20px;
        border-radius: 15px;
        width: 350px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        text-align: center;
      }

      input {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #ccc;
        margin-bottom: 10px;
      }

      video {
        width: 100%;
        border-radius: 10px;
        margin-bottom: 10px;
      }

      #map {
        height: 200px;
        border-radius: 10px;
        margin-top: 10px;
      }

      button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: #4facfe;
        color: white;
        font-size: 16px;
        margin-top: 10px;
        cursor: pointer;
      }

      .status {
        margin-top: 10px;
        font-size: 14px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>📍 Absensi Digital</h2>

      <input type="text" id="nama" placeholder="Masukkan Nama" />

      <video id="video" autoplay></video>
      <canvas
        id="canvas"
        width="300"
        height="200"
        style="display: none"
      ></canvas>

      <!-- MAP -->
      <div id="map"></div>

      <button onclick="absen()">📸 Absen</button>

      <div id="status" class="status"></div>
    </div>

    <!-- LEAFLET JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script>
      let lastLat = null;
      let lastLng = null;
      let lastTime = null;

      let skorCurang = 0;

      // HITUNG JARAK
      function jarak(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = ((lat2 - lat1) * Math.PI) / 180;
        const dLon = ((lon2 - lon1) * Math.PI) / 180;

        const a =
          Math.sin(dLat / 2) * Math.sin(dLat / 2) +
          Math.cos((lat1 * Math.PI) / 180) *
            Math.cos((lat2 * Math.PI) / 180) *
            Math.sin(dLon / 2) *
            Math.sin(dLon / 2);

        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      }

      // TRACKING REALTIME
      navigator.geolocation.watchPosition(
        (pos) => {
          const lat = pos.coords.latitude;
          const lng = pos.coords.longitude;
          const acc = pos.coords.accuracy;
          const now = Date.now();

          console.log("Lokasi:", lat, lng);

          // 🚩 1. CEK LONCAT LOKASI
          if (lastLat !== null) {
            const dist = jarak(lastLat, lastLng, lat, lng);
            const timeDiff = (now - lastTime) / 1000; // detik

            const speed = dist / (timeDiff / 3600); // km/h

            if (speed > 200) {
              skorCurang += 2;
              console.log("🚨 Loncat lokasi tidak wajar");
            }
          }

          // 🚩 2. CEK LOKASI TERLALU STABIL
          if (lastLat !== null) {
            if (Math.abs(lat - lastLat) < 0.000001) {
              skorCurang += 1;
              console.log("🚨 Lokasi terlalu stabil");
            }
          }

          // 🚩 3. CEK AKURASI
          if (acc > 100) {
            skorCurang += 1;
            console.log("🚨 Akurasi buruk");
          }

          lastLat = lat;
          lastLng = lng;
          lastTime = now;

          console.log("Skor Curang:", skorCurang);
        },
        (err) => {
          console.log("GPS error");
        },
      );
    </script>
  </body>
</html>
