<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Deteksi Fake GPS</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #4facfe, #00f2fe);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
      }

      .container {
        background: #fff;
        padding: 20px;
        border-radius: 15px;
        width: 350px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        text-align: center;
      }

      video {
        width: 100%;
        border-radius: 10px;
      }

      #map {
        height: 200px;
        margin-top: 10px;
        border-radius: 10px;
      }

      .status {
        margin-top: 10px;
        font-size: 14px;
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h3>📍 Deteksi Lokasi</h3>

      <video id="video" autoplay></video>

      <div id="map"></div>

      <div id="status" class="status">⏳ Mendeteksi lokasi...</div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script>
      let lastLat = null,
        lastLng = null,
        lastTime = null;
      let skor = 0;
      let sudahAlert = false;

      const statusText = document.getElementById("status");

      // ================= MAP =================
      const map = L.map("map").setView([-2.2, 113.9], 13);

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(
        map,
      );

      let marker;

      // ================= CAMERA =================
      navigator.mediaDevices.getUserMedia({ video: true }).then((stream) => {
        document.getElementById("video").srcObject = stream;
      });

      // ================= DISTANCE =================
      function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = ((lat2 - lat1) * Math.PI) / 180;
        const dLon = ((lon2 - lon1) * Math.PI) / 180;

        const a =
          Math.sin(dLat / 2) ** 2 +
          Math.cos((lat1 * Math.PI) / 180) *
            Math.cos((lat2 * Math.PI) / 180) *
            Math.sin(dLon / 2) ** 2;

        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      }

      // ================= TRACKING =================
      navigator.geolocation.watchPosition(
        (pos) => {
          const lat = pos.coords.latitude;
          const lng = pos.coords.longitude;
          const acc = pos.coords.accuracy;
          const now = Date.now();

          console.log("📍 Lokasi:", lat, lng);

          // update map
          map.setView([lat, lng], 16);

          if (marker) marker.remove();
          marker = L.marker([lat, lng]).addTo(map);

          // 🚨 loncat lokasi
          if (lastLat) {
            const dist = getDistance(lat, lng, lastLat, lastLng);
            const time = (now - lastTime) / 1000;
            const speed = dist / (time / 3600);

            if (speed > 200) {
              skor += 2;
              console.log("🚨 Loncat tidak wajar");
            }
          }

          // 🚨 terlalu stabil
          if (lastLat && Math.abs(lat - lastLat) < 0.000001) {
            skor += 1;
            console.log("🚨 Lokasi terlalu stabil");
          }

          // 🚨 akurasi
          if (acc > 100) {
            skor += 1;
            console.log("🚨 Akurasi buruk");
          }

          lastLat = lat;
          lastLng = lng;
          lastTime = now;

          console.log("⚠️ Skor:", skor);

          // ================= STATUS =================
          if (skor >= 5) {
            console.log("❌ FAKE GPS TERDETEKSI");

            statusText.innerHTML = "❌ Fake GPS terdeteksi!";
            statusText.style.color = "red";

            // ALERT KE USER
            if (!sudahAlert) {
              alert("⚠️ Anda terdeteksi menggunakan Fake GPS!");
              sudahAlert = true;
            }
          } else if (skor >= 3) {
            statusText.innerHTML = "⚠️ Lokasi mencurigakan";
            statusText.style.color = "orange";
          } else {
            statusText.innerHTML = "✅ Lokasi normal";
            statusText.style.color = "green";
          }
        },
        (err) => {
          statusText.innerHTML = "❌ GPS tidak diizinkan";
        },
      );
    </script>
  </body>
</html>
